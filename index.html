<!DOCTYPE html>
<html>
<head>
  <title>Jergan Animate+</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="topbar">
    <h1>Jergan Animate+</h1>
    <div>
      <button onclick="play()">▶</button>
      <button onclick="pause()">⏸</button>
      <button onclick="exportFrames()">Export</button>
    </div>
  </div>

  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

  <div class="timeline">
    <input type="range" min="0" max="5" step="0.01" id="slider">
  </div>

  <div class="tools">
    <button onclick="addObject()">Add Box</button>
    <input type="file" id="imgUpload" accept="image/*">
    <input type="file" id="audioUpload" accept="audio/*">
    <button onclick="addKeyframe()">Add Keyframe</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
