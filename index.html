<!DOCTYPE html>
<html>
<head>
  <title>Jergan Animate+</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Top Bar -->
  <div class="topbar">
    <h1>Jergan Animate+</h1>
    <div>
      <button onclick="play()">▶</button>
      <button onclick="pause()">⏸</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

  <!-- Timeline -->
  <div class="timeline">
    <input type="range" min="0" max="2" step="0.01" id="slider">
  </div>

  <!-- Tools -->
  <div class="tools">
    <button onclick="addKeyframe()">Add Keyframe</button>
    <button onclick="addPreset()">Preset</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
